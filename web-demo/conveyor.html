<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com">
  <title>Bake a Wish — Conveyor Belt Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/conveyor.css">
</head>
<body>
  <div id="conveyor-screen">

    <!-- HUD -->
    <div id="conveyor-hud">
      <div class="hud-left">
        <span id="hud-shift-label">Conveyor Shift</span>
        <div id="hud-progress">
          <div id="hud-progress-fill"></div>
        </div>
        <span id="hud-dish-count">0 / 12</span>
      </div>
      <div class="hud-right">
        <span id="hud-streak">Streak: 0</span>
        <span id="hud-mistakes">❌ 0</span>
      </div>
    </div>

    <!-- Main play area -->
    <div id="play-area">

      <!-- Tables: 4 sides of the belt -->
      <!-- Top tables -->
      <div class="table-side table-side-top" id="tables-top"></div>
      <!-- Right tables -->
      <div class="table-side table-side-right" id="tables-right"></div>
      <!-- Bottom tables -->
      <div class="table-side table-side-bottom" id="tables-bottom"></div>
      <!-- Left tables -->
      <div class="table-side table-side-left" id="tables-left"></div>

      <!-- The conveyor belt (square loop) -->
      <div id="conveyor-belt">
        <div id="belt-track">
          <!-- Belt corner markers -->
          <div class="belt-corner corner-tl"></div>
          <div class="belt-corner corner-tr"></div>
          <div class="belt-corner corner-br"></div>
          <div class="belt-corner corner-bl"></div>
          <!-- Plates are dynamically injected here -->
        </div>
      </div>

      <!-- Barista sprite (coffee icon) -->
      <div id="cb-barista">&#9749;</div>

    </div>

    <!-- Order board overlay (appears when barista reaches a table) -->
    <div id="cb-order-board" class="hidden">
      <div id="cb-order-board-inner">
        <div id="cb-order-header">
          <span id="cb-order-avatar"></span>
          <div id="cb-order-info">
            <div id="cb-order-customer-name">Customer</div>
            <div id="cb-order-dialogue"></div>
          </div>
          <button id="cb-order-close-btn" title="Close">&times;</button>
        </div>
        <div id="cb-order-items"></div>

        <!-- Customer chat (small talk) -->
        <div id="cb-chat" class="hidden">
          <div id="cb-chat-bubble">
            <div id="cb-chat-customer-line"></div>
          </div>
          <div id="cb-chat-choices">
            <button class="cb-chat-choice" data-choice="0"></button>
            <button class="cb-chat-choice" data-choice="1"></button>
          </div>
          <div id="cb-chat-response" class="hidden">
            <div id="cb-chat-response-text"></div>
          </div>
        </div>

        <button id="cb-order-done-btn">Done</button>
      </div>
    </div>

    <!-- Serve result overlay -->
    <div id="serve-result" class="hidden">
      <div id="serve-result-icon"></div>
      <div id="serve-result-text"></div>
    </div>

    <!-- Shift complete overlay -->
    <div id="shift-complete" class="hidden">
      <h2>Shift Complete!</h2>
      <div id="shift-summary"></div>
      <button id="shift-continue-btn">Continue</button>
    </div>

  </div>

  <script src="js/cafe-data.js?v=5"></script>
  <script src="js/conveyor.js?v=2"></script>
</body>
</html>
